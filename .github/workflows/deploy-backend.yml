name: Deploy Backend

on:
  workflow_run:
    workflows: [Verify]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: demo
    env:
      RENDER_BACKEND_DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK_URL }}
      RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
      RENDER_BACKEND_SERVICE_ID: ${{ vars.RENDER_BACKEND_SERVICE_ID }}
      RENDER_API_BASE_URL: https://api.render.com/v1

    steps:
      - name: Capture current backend deploy id
        id: baseline
        run: |
          set -eu
          response="$(curl --silent --show-error --fail \
            --header "Authorization: Bearer $RENDER_API_KEY" \
            --header "Accept: application/json" \
            "$RENDER_API_BASE_URL/services/$RENDER_BACKEND_SERVICE_ID/deploys")"
          deploy_id="$(printf '%s' "$response" | jq -r '.[0].id // .deploys[0].id // empty')"
          printf 'baseline_deploy_id=%s\n' "$deploy_id" >> "$GITHUB_OUTPUT"

      - name: Trigger Render backend deploy
        run: |
          set -eu
          if [ -z "${RENDER_BACKEND_DEPLOY_HOOK_URL:-}" ]; then
            echo "RENDER_BACKEND_DEPLOY_HOOK_URL is not set."
            exit 1
          fi

          curl --fail --silent --show-error --request POST "$RENDER_BACKEND_DEPLOY_HOOK_URL" >/dev/null
          echo "Triggered Render backend deploy"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Wait for backend to become ready
        run: sh ./scripts/render-deploy-wait.sh
        env:
          BASELINE_DEPLOY_ID: ${{ steps.baseline.outputs.baseline_deploy_id }}
