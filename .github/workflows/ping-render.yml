name: Ping Render

on:
  schedule:
    - cron: "*/4 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    environment: demo
    env:
      RENDER_BACKEND_URL: ${{ vars.RENDER_BACKEND_URL || secrets.RENDER_BACKEND_URL }}

    steps:
      - name: Ping backend actuator health endpoint
        run: |
          set -eu
          if [ -z "${RENDER_BACKEND_URL:-}" ]; then
            echo "RENDER_BACKEND_URL is not set."
            exit 1
          fi

          health_url="$RENDER_BACKEND_URL/actuator/health?keepAlive=$(date +%s)"

          curl \
            --fail \
            --silent \
            --show-error \
            --connect-timeout 10 \
            --max-time 30 \
            --retry 3 \
            --retry-delay 5 \
            --retry-all-errors \
            --header "Cache-Control: no-cache, no-store, max-age=0" \
            --header "Pragma: no-cache" \
            "$health_url" \
            >/dev/null
          echo "Pinged $health_url"
