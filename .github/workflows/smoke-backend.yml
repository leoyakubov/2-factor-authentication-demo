name: Smoke Backend

on:
  workflow_run:
    workflows: [Deploy Backend]
    types: [completed]
  workflow_dispatch:

jobs:
  smoke:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: demo
    env:
      SMOKE_CHECK: backend
      RENDER_BACKEND_URL: ${{ vars.RENDER_BACKEND_URL || secrets.RENDER_BACKEND_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Run backend smoke checks
        run: sh ./scripts/deployment-smoke.sh
