name: Smoke Frontend

on:
  workflow_run:
    workflows: [Deploy Frontend]
    types: [completed]
  workflow_dispatch:

jobs:
  smoke:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: demo
    env:
      SMOKE_CHECK: frontend
      RENDER_FRONTEND_URL: ${{ vars.RENDER_FRONTEND_URL || secrets.RENDER_FRONTEND_URL }}

    steps:
      - name: Wait for Render deploy
        run: sleep 60

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2

      - name: Run frontend smoke checks
        run: sh ./scripts/deployment-smoke.sh
