name: Verify

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    name: Backend and frontend verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify backend
        run: ./scripts/backend-verify.sh

      - name: Verify frontend
        run: ./scripts/frontend-verify.sh
