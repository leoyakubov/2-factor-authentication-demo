services:
  - type: web
    name: two-factor-authentication-demo-backend
    runtime: docker
    plan: free
    dockerfilePath: infra/backend.Dockerfile
    dockerContext: .
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: demo

  - type: web
    name: two-factor-authentication-demo-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
