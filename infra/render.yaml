services:
  - type: pserv
    name: two-factor-authentication-demo-mongo
    runtime: docker
    dockerfilePath: infra/mongo.Dockerfile
    dockerContext: .

  - type: web
    name: two-factor-authentication-demo-backend
    runtime: docker
    plan: free
    dockerfilePath: infra/backend.Dockerfile
    dockerContext: .
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: demo
      - key: MONGODB_HOST
        fromService:
          name: two-factor-authentication-demo-mongo
          type: pserv
          property: host
      - key: MONGODB_PORT
        fromService:
          name: two-factor-authentication-demo-mongo
          type: pserv
          property: port
      - key: MONGODB_DATABASE
        value: two-factor-authentication-demo

  - type: web
    name: two-factor-authentication-demo-frontend
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
