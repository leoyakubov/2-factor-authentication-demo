spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: backend
  data:
    mongodb:
      host: ${MONGODB_HOST:localhost}
      database: ${MONGODB_DATABASE:spring-boot-jwt-auth}
      port: ${MONGODB_PORT:27018}

server:
  port: ${SERVER_PORT:8081}

app:
  frontend:
    base-url: ${FRONTEND_ORIGIN:http://localhost:3000}
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN:http://localhost:3000}

de:
  flapdoodle:
    mongodb:
      embedded:
        version: ${EMBEDDED_MONGODB_VERSION:8.0.5}

security:
  jwt:
    header: ${JWT_HEADER:Authorization}
    prefix: ${JWT_PREFIX:Bearer}
    expiration: ${JWT_EXPIRATION:PT24H}
    secret: ${JWT_SECRET}
    cookie-name: ${JWT_COOKIE_NAME:AUTH_TOKEN}
    cookie-path: ${JWT_COOKIE_PATH:/}
    cookie-secure: ${JWT_COOKIE_SECURE:false}
    cookie-same-site: ${JWT_COOKIE_SAME_SITE:Strict}
  auth:
    rate-limit:
      max-attempts: ${AUTH_RATE_LIMIT_MAX_ATTEMPTS:5}
      window: ${AUTH_RATE_LIMIT_WINDOW:PT10M}
      lockout: ${AUTH_RATE_LIMIT_LOCKOUT:PT15M}
  headers:
    content-security-policy: "${CONTENT_SECURITY_POLICY:default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; img-src 'self' data:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' ${FRONTEND_ORIGIN:http://localhost:3000} ${BACKEND_ORIGIN:http://localhost:8081}}"

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [%X{requestId}] %logger{36} - %msg%n"
