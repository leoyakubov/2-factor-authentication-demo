spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: backend
  data:
    mongodb:
      host: ${MONGODB_HOST:localhost}
      database: ${MONGODB_DATABASE:two-factor-authentication-demo}
      port: ${MONGODB_PORT:27018}
      auto-index-creation: true

server:
  port: ${PORT:${SERVER_PORT:8081}}

app:
  frontend:
    base-url: ${FRONTEND_ORIGIN:http://localhost:3000}
  cors:
    allowed-origins:
      - ${FRONTEND_ORIGIN:http://localhost:3000}
  openapi:
    title: ${OPENAPI_TITLE:2-Factor Authentication Demo API}
    version: ${OPENAPI_VERSION:0.1.0}
    description: ${OPENAPI_DESCRIPTION:Signup, login, MFA verification, CSRF bootstrap, logout, and profile endpoints.}
    license: ${OPENAPI_LICENSE:MIT}
management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
  endpoint:
    health:
      show-details: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:never}

de:
  flapdoodle:
    mongodb:
      embedded:
        version: ${EMBEDDED_MONGODB_VERSION:8.0.5}

security:
  jwt:
    header: ${JWT_HEADER:Authorization}
    prefix: ${JWT_PREFIX:Bearer}
    expiration: ${JWT_EXPIRATION:PT24H}
    secret: ${JWT_SECRET}
    cookie-name: ${JWT_COOKIE_NAME:AUTH_TOKEN}
    cookie-path: ${JWT_COOKIE_PATH:/}
    cookie-secure: ${JWT_COOKIE_SECURE:false}
    cookie-same-site: ${JWT_COOKIE_SAME_SITE:Strict}
  mfa:
    encryption-key: ${MFA_SECRET_ENCRYPTION_KEY:${JWT_SECRET}}
  auth:
    rate-limit:
      max-attempts: ${AUTH_RATE_LIMIT_MAX_ATTEMPTS:5}
      window: ${AUTH_RATE_LIMIT_WINDOW:PT10M}
      lockout: ${AUTH_RATE_LIMIT_LOCKOUT:PT15M}
  headers:
    content-security-policy-override: ${CONTENT_SECURITY_POLICY:}
    content-security-policy:
      default-src:
        - "'self'"
      base-uri:
        - "'self'"
      form-action:
        - "'self'"
      frame-ancestors:
        - "'none'"
      img-src:
        - "'self'"
        - "data:"
      script-src:
        - "'self'"
      style-src:
        - "'self'"
        - "'unsafe-inline'"
      connect-src:
        - "'self'"
        - ${FRONTEND_ORIGIN:http://localhost:3000}
        - ${BACKEND_ORIGIN:http://localhost:8081}

logging:
  level:
    com.github.leoyakubov.twofactorauth: DEBUG
    de.flapdoodle.embed.mongo: WARN
    de.flapdoodle.embed.mongo.spring.autoconfigure.EmbeddedMongo: WARN
    org.mongodb.driver.cluster: WARN
    org.mongodb.driver.connection: WARN
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] [%X{requestId}] %logger{36} - %msg%n"
