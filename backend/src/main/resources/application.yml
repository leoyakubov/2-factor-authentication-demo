spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: backend
  data:
    mongodb:
      host: ${MONGODB_HOST:localhost}
      database: ${MONGODB_DATABASE:spring-boot-jwt-auth}
      port: ${MONGODB_PORT:27018}

  mongodb:
    embedded:
      version: 5.0.5

de:
  flapdoodle:
    mongodb:
      embedded:
        version: 5.0.5

server:
  port: ${SERVER_PORT:8081}

app:
  frontend:
    base-url: ${FRONTEND_ORIGIN:http://localhost:3000}
  cors:
    allowed-origins: ${FRONTEND_ORIGIN:http://localhost:3000}

security:
  jwt:
    header: ${JWT_HEADER:Authorization}
    prefix: ${JWT_PREFIX:Bearer}
    expiration: ${JWT_EXPIRATION:86400}
    secret: ${JWT_SECRET}
    cookie-name: ${JWT_COOKIE_NAME:AUTH_TOKEN}
    cookie-path: ${JWT_COOKIE_PATH:/}
    cookie-secure: ${JWT_COOKIE_SECURE:false}
    cookie-same-site: ${JWT_COOKIE_SAME_SITE:Strict}
  auth:
    rate-limit:
      max-attempts: ${AUTH_RATE_LIMIT_MAX_ATTEMPTS:5}
      window: ${AUTH_RATE_LIMIT_WINDOW:PT10M}
      lockout: ${AUTH_RATE_LIMIT_LOCKOUT:PT15M}
